services:
  pg_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_storage:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:${DB_PORT}"

  db_manager:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"

volumes:
  pg_storage: